services:
  - type: web
    name: torrentio-addon
    runtime: node
    buildCommand: cd addon && npm install --production
    startCommand: cd addon && npm start
    envVars:
      - key: DATABASE_URI
        fromDatabase:
          name: torrentio
          property: connectionString
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production

  - type: web
    name: torrentio-scraper
    runtime: node
    buildCommand: cd scraper && npm install --production
    startCommand: cd scraper && npm start
    envVars:
      - key: DATABASE_URI
        fromDatabase:
          name: torrentio
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: torrentio
    user: torrentio_user
