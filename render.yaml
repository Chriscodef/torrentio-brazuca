services:
  - type: pserv
    name: torrentio-postgres
    runtime: image
    image:
      fromRegistry: true
      registryCredential: registry-credential
      url: postgres:16-alpine
    envVars:
      - key: POSTGRES_USER
        value: torrentio
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: torrentio
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 50
    plan: starter

  - type: redis
    name: torrentio-redis
    ipAddress: redis
    plan: starter
    maxmemoryPolicy: allkeys_lru

  - type: web
    name: torrentio-addon
    runtime: node
    buildCommand: |
      cd addon
      npm install
    startCommand: cd addon && npm start
    envVars:
      - key: DATABASE_URL
        fromService:
          name: torrentio-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: torrentio-redis
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CACHE_MAX_AGE
        value: "3600"
    plan: starter
    healthCheckPath: /

  - type: web
    name: torrentio-catalogs
    runtime: node
    buildCommand: |
      cd catalogs
      npm install
    startCommand: cd catalogs && npm start
    envVars:
      - key: DATABASE_URL
        fromService:
          name: torrentio-postgres
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
    plan: starter
    healthCheckPath: /

  - type: web
    name: torrentio-scraper
    runtime: node
    buildCommand: |
      cd scraper
      npm install
    startCommand: cd scraper && npm start
    envVars:
      - key: DATABASE_URI
        fromService:
          name: torrentio-postgres
          property: connectionString
      - key: SCRAPER_INTERVAL
        value: "0 */4 * * *"
      - key: MAX_PAGES
        value: "3"
      - key: LOG_LEVEL
        value: info
      - key: NODE_ENV
        value: production
    plan: starter

databases:
  - name: torrentio
    plan: starter
    postgresVersion: 16
