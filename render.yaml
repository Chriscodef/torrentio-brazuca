services:
  - type: web
    name: torrentio-addon
    runtime: node
    buildCommand: cd addon && npm install
    startCommand: cd addon && npm start
    envVars:
      - key: DATABASE_URI
        fromDatabase:
          name: torrentio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis-cache
          property: connectionString
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
    plan: free
    autoDeploy: false

  - type: web
    name: torrentio-scraper
    runtime: node
    buildCommand: cd scraper && npm install
    startCommand: cd scraper && npm start
    envVars:
      - key: DATABASE_URI
        fromDatabase:
          name: torrentio-db
          property: connectionString
      - key: SCRAPER_INTERVAL
        value: "0 */6 * * *"
      - key: MAX_PAGES
        value: "5"
      - key: LOG_LEVEL
        value: "info"
      - key: NODE_ENV
        value: production
    plan: free
    autoDeploy: false

  - type: redis
    name: redis-cache
    plan: free

databases:
  - name: torrentio-db
    databaseName: torrentio
    user: torrentio
    plan: free
    postgresVersion: 16
