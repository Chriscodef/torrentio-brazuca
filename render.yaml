services:
  - type: web
    name: torrentio-addon
    runtime: node
    repo: https://github.com/Chriscodef/torrentio-brazuca.git
    branch: main
    buildCommand: cd addon && npm install
    startCommand: cd addon && npm start
    rootDir: addon
    envVars:
      - key: DATABASE_URI
        value: ${{ DATABASE_URL }}
      - key: REDIS_URL
        fromService:
          name: redis-cache
          property: connectionString
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
    plan: free
    autoDeploy: true

  - type: web
    name: torrentio-scraper
    runtime: node
    repo: https://github.com/Chriscodef/torrentio-brazuca.git
    branch: main
    buildCommand: cd scraper && npm install
    startCommand: cd scraper && npm start
    rootDir: scraper
    envVars:
      - key: DATABASE_URI
        value: ${{ DATABASE_URL }}
      - key: SCRAPER_INTERVAL
        value: "0 */6 * * *"
      - key: MAX_PAGES
        value: "5"
      - key: LOG_LEVEL
        value: info
      - key: NODE_ENV
        value: production
    plan: free
    autoDeploy: true

  - type: redis
    name: redis-cache
    plan: free

databases:
  - name: torrentio-db
    databaseName: torrentio
    user: torrentio
    plan: free
    postgresVersion: 16
    ipAllowList: []
